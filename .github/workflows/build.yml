name: build

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: avi-dev-user
          password: ${{ secrets.GHCR_TOKEN }}
      - name: Tags
        id: tags
        run: |
          SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          IMG=ghcr.io/${{ github.repository_owner }}/unshackle-tg
          echo "tags=${IMG}:latest,${IMG}:${SHORT}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Trigger downstream unshackle-bot rebuild
        # The unshackle-bot Dockerfile FROMs ghcr.io/avi-dev-user/unshackle-tg:latest.
        # When this base changes, the overlay must rebuild on the new base.
        env:
          GH_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          gh workflow run build.yml -R avi-dev-user/unshackle-bot --ref main || true
